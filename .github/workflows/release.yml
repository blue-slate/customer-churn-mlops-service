name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to simulate, without leading v"
        required: true
        default: "0.0.0-test"
      dry_run:
        description: "Skip pushing Docker image"
        required: true
        default: true
        type: boolean

env:
  IMAGE_NAME: docker.io/doyonm/customer-churn-mlops-service

jobs:
  release-image:
    name: Tag and push release image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        run: |
          git fetch origin main

          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tagged commit is on main."
          else
            echo "Tagged commit is not on main. Refusing to release."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract image tags
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          SHORT_SHA="$(git rev-parse --short HEAD)"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Check if commit image already exists
        id: check_image
        run: |
          COMMIT_IMAGE="${IMAGE_NAME}:${{ steps.vars.outputs.sha_tag }}"

          if docker manifest inspect "$COMMIT_IMAGE" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Found existing image: $COMMIT_IMAGE"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing image found for: $COMMIT_IMAGE"
          fi

      - name: Pull existing commit image
        if: steps.check_image.outputs.exists == 'true'
        run: |
          docker pull "${IMAGE_NAME}:${{ steps.vars.outputs.sha_tag }}"

      - name: Retag existing image as release version
        if: steps.check_image.outputs.exists == 'true'
        run: |
          docker tag \
            "${IMAGE_NAME}:${{ steps.vars.outputs.sha_tag }}" \
            "${IMAGE_NAME}:${{ steps.vars.outputs.version }}"

      - name: Build release image if commit image does not exist
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.version }}
    
      - name: Show planned image operations
        run: |
          echo "Commit image: ${IMAGE_NAME}:${{ steps.vars.outputs.sha_tag }}"
          echo "Release image: ${IMAGE_NAME}:${{ steps.vars.outputs.version }}"
          echo "Dry run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}"

      - name: Push release image
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        run: |
          docker push "${IMAGE_NAME}:${{ steps.vars.outputs.version }}"